{% load static otp_webauthn %}<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sign in - DCM</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#FECDD3">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['"SF Pro Display"', '"SF Pro Text"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'system-ui', 'sans-serif'],
        },
        fontSize: {
          'xs': ['0.8125rem', { lineHeight: '1.25rem' }],
          'sm': ['0.9375rem', { lineHeight: '1.5rem' }],
        },
        colors: {
          peach: {
            50: '#FFF8F6',
            100: '#F0E0DA',
            200: '#FECDD3',
            300: '#E8A0A0',
            600: '#A06060',
            700: '#8B5252',
            900: '#4A3728',
          },
        },
        boxShadow: {
          'warm': '0 1px 3px rgba(74,55,40,0.08)',
          'warm-md': '0 4px 6px rgba(74,55,40,0.10)',
        },
      }
    }
  }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    body { font-size: 16px; line-height: 1.6; letter-spacing: -0.011em; }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body class="h-full bg-[#FFF5F2] flex items-center justify-center px-4"
      style="font-family: 'SF Pro Display', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-semibold text-peach-900 tracking-tight">Defense Case Manager</h1>
      <p class="mt-2 text-sm text-[#9B8A82]">Sign in to continue</p>
    </div>

    <div class="bg-peach-50 rounded-2xl shadow-warm border border-peach-100 p-6">
      {% if form.errors %}
      <div class="mb-4 rounded-xl bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-800">
        Invalid username or password.
      </div>
      {% endif %}

      <!-- WebAuthn Face ID / Passkey -->
      <div id="passkey-verification-placeholder" class="mb-4">
        <!-- Replaced by JS if WebAuthn is available -->
      </div>

      <template id="passkey-verification-available-template">
        <div class="mb-4">
          <button type="button"
                  id="passkey-verification-button"
                  class="w-full rounded-xl bg-peach-200 px-4 py-3 text-sm font-semibold text-peach-900 hover:bg-peach-300/60 active:bg-peach-300/80 transition-colors flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 11c0 1.657-1.343 3-3 3s-3-1.343-3-3 1.343-3 3-3 3 1.343 3 3zm0 0c0 1.657 1.343 3 3 3s3-1.343 3-3-1.343-3-3-3-3 1.343-3 3zm-3 8v-1a4 4 0 014-4h0a4 4 0 014 4v1"/>
            </svg>
            Sign in with Face ID
          </button>
          <p id="passkey-verification-status-message"
             class="mt-2 text-center text-sm text-[#9B8A82] hidden"
             aria-live="assertive"></p>
        </div>

        <div class="relative my-5">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-peach-100"></div>
          </div>
          <div class="relative flex justify-center text-xs">
            <span class="bg-peach-50 px-3 text-[#9B8A82]">or use password</span>
          </div>
        </div>
      </template>

      <template id="passkey-verification-unavailable-template">
        <!-- No passkey support — just show the password form -->
      </template>

      <form method="post" action="{% url 'accounts:login' %}" class="space-y-4">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <div>
          <label for="id_username" class="block text-sm font-medium text-peach-900/70 mb-1.5">Username</label>
          <input type="text"
                 id="id_username"
                 name="username"
                 autocomplete="username webauthn"
                 autofocus
                 required
                 class="block w-full rounded-xl border border-peach-100 bg-white px-3 py-2.5 text-base text-peach-900 placeholder-[#9B8A82] focus:border-peach-300 focus:ring-1 focus:ring-peach-300 focus:outline-none transition-colors">
        </div>

        <div>
          <label for="id_password" class="block text-sm font-medium text-peach-900/70 mb-1.5">Password</label>
          <input type="password"
                 id="id_password"
                 name="password"
                 autocomplete="current-password"
                 required
                 class="block w-full rounded-xl border border-peach-100 bg-white px-3 py-2.5 text-base text-peach-900 placeholder-[#9B8A82] focus:border-peach-300 focus:ring-1 focus:ring-peach-300 focus:outline-none transition-colors">
        </div>

        <button type="submit"
                class="w-full rounded-xl bg-peach-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-peach-700 active:bg-peach-700 transition-colors">
          Sign in
        </button>
      </form>
    </div>
  </div>

  <!-- WebAuthn authentication scripts (handles Face ID ceremony) -->
  {% render_otp_webauthn_auth_scripts username_field_selector="#id_username" %}

  <!-- Show/hide status message when it has content -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var statusEl = document.getElementById('passkey-verification-status-message');
    if (statusEl) {
      new MutationObserver(function() {
        statusEl.classList.toggle('hidden', !statusEl.textContent.trim());
      }).observe(statusEl, { childList: true, characterData: true, subtree: true });
    }
  });
  </script>

</body>
</html>
