{% extends "base.html" %}

{% block title %}Search - Defense Case Manager{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-6 space-y-4">

  <!-- Search input -->
  <div class="relative">
    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-walnut-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
    <input type="search"
           name="q"
           value="{{ query }}"
           placeholder="Search cases, contacts, notes, deadlines..."
           autofocus
           autocomplete="off"
           hx-get="{% url 'cases:search-results' %}"
           hx-trigger="keyup changed delay:300ms, search"
           hx-target="#search-results"
           hx-swap="innerHTML"
           class="block w-full rounded-card border border-cream-200 bg-cream-50 pl-12 pr-4 py-3.5 text-base text-walnut-800 placeholder-walnut-300 shadow-warm focus:border-terra-400 focus:ring-1 focus:ring-terra-400 focus:outline-none">
  </div>

  <!-- Results -->
  <div id="search-results">
    {% include "cases/partials/search_results.html" %}
  </div>

</div>
{% endblock %}
